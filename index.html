<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教師研習活動 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1714;
  --ink-60: #6b6460;
  --ink-30: #c8c4c0;
  --paper: #f7f4ef;
  --paper-warm: #efe9e0;
  --accent: #8b4513;
  --accent-light: #c4783a;
  --gold: #b8860b;
  --health: #2d6a4f;
  --health-bg: #e8f5e0;
  --art: #5b3e8a;
  --art-bg: #ede8f8;
  --tech: #1a4f7a;
  --tech-bg: #e0edf8;
  --food: #7a4a00;
  --food-bg: #fdf0d5;
  --dance: #7a2040;
  --dance-bg: #fce8ee;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--paper);
  color: var(--ink);
  font-weight: 300;
  line-height: 1.8;
  min-height: 100vh;
}

/* HEADER */
header {
  background: var(--ink);
  color: var(--paper);
  padding: 0;
  position: relative;
  overflow: hidden;
}

.header-inner {
  max-width: 1100px;
  margin: 0 auto;
  padding: 3.5rem 2rem 2.5rem;
  position: relative;
  z-index: 1;
}

.header-deco {
  position: absolute;
  top: 0; right: 0;
  width: 320px; height: 100%;
  opacity: 0.04;
  pointer-events: none;
}

.header-deco svg { width: 100%; height: 100%; }

.site-label {
  font-family: 'Noto Serif TC', serif;
  font-size: 13.2px;
  letter-spacing: 0.3em;
  color: var(--accent-light);
  text-transform: uppercase;
  margin-bottom: 0.75rem;
  display: block;
}

h1 {
  font-family: 'Noto Serif TC', serif;
  font-size: clamp(2.4rem, 5vw, 3.84rem);
  font-weight: 300;
  line-height: 1.2;
  color: var(--paper);
  margin-bottom: 0.5rem;
  letter-spacing: 0.05em;
}

.subtitle {
  font-size: 16.8px;
  color: rgba(247,244,239,0.55);
  letter-spacing: 0.08em;
  margin-bottom: 2rem;
}

.stats-row {
  display: flex;
  gap: 2.5rem;
  border-top: 1px solid rgba(247,244,239,0.1);
  padding-top: 1.5rem;
  flex-wrap: wrap;
}

.stat { text-align: left; }
.stat-num {
  font-family: 'Noto Serif TC', serif;
  font-size: 2.4rem;
  font-weight: 400;
  color: var(--accent-light);
  line-height: 1;
}
.stat-label {
  font-size: 13.2px;
  color: rgba(247,244,239,0.45);
  letter-spacing: 0.15em;
  margin-top: 4px;
}

/* SEARCH BAR */
.search-section {
  background: var(--ink);
  padding-bottom: 2rem;
  border-bottom: 1px solid rgba(247,244,239,0.08);
}

.search-inner {
  max-width: 1100px;
  margin: 0 auto;
  padding: 1rem 2rem 0;
  display: flex;
  gap: 12px;
  align-items: center;
  flex-wrap: wrap;
}

.search-wrap {
  flex: 1;
  min-width: 200px;
  position: relative;
}

.search-wrap svg {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: rgba(247,244,239,0.35);
  pointer-events: none;
}

#search {
  width: 100%;
  padding: 11px 16px 11px 42px;
  background: rgba(247,244,239,0.07);
  border: 1px solid rgba(247,244,239,0.12);
  border-radius: 8px;
  color: var(--paper);
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 16.8px;
  font-weight: 300;
  outline: none;
  transition: border-color 0.2s;
}
#search::placeholder { color: rgba(247,244,239,0.3); }
#search:focus { border-color: rgba(247,244,239,0.3); }

.filter-wrap {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.pill {
  padding: 8px 18px;
  border-radius: 99px;
  border: 1px solid rgba(247,244,239,0.15);
  background: transparent;
  color: rgba(247,244,239,0.55);
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 15.6px;
  font-weight: 300;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.05em;
}
.pill:hover { border-color: rgba(247,244,239,0.35); color: rgba(247,244,239,0.85); }
.pill.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
  font-weight: 500;
}

/* MAIN */
main {
  max-width: 1100px;
  margin: 0 auto;
  padding: 2.5rem 2rem 4rem;
}

.result-count {
  font-size: 14.4px;
  color: var(--ink-60);
  letter-spacing: 0.1em;
  margin-bottom: 1.75rem;
}

/* CARDS GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 20px;
}

.card {
  background: #fff;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid rgba(26,23,20,0.07);
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  display: flex;
  flex-direction: column;
  animation: fadeUp 0.35s both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 32px rgba(26,23,20,0.1);
}

.card-accent-bar {
  height: 3px;
  width: 100%;
}

.card-body { padding: 1.4rem 1.4rem 1rem; flex: 1; }

.card-head {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 10px;
}

.icon-circle {
  width: 42px; height: 42px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 24px;
}

.card-tag {
  display: inline-block;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.12em;
  padding: 3px 10px;
  border-radius: 4px;
  margin-bottom: 5px;
}

.card-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 20.4px;
  font-weight: 400;
  color: var(--ink);
  line-height: 1.4;
}

.card-desc {
  font-size: 15.6px;
  color: var(--ink-60);
  line-height: 1.7;
  margin-bottom: 14px;
}

.card-meta {
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: 12px 0;
  border-top: 1px solid rgba(26,23,20,0.06);
}

.meta-item {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  font-size: 14.4px;
  color: var(--ink-60);
}
.meta-item svg { flex-shrink: 0; margin-top: 2px; }
.meta-val { color: var(--ink); font-weight: 400; }

.card-footer {
  padding: 10px 1.4rem 1.2rem;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.speaker-chip {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: var(--paper);
  border-radius: 99px;
  padding: 4px 12px 4px 5px;
  font-size: 14.4px;
  color: var(--ink-60);
}

.chip-avatar {
  width: 24px; height: 24px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10.8px; font-weight: 500; color: #fff;
  flex-shrink: 0;
}
.chip-name { color: var(--ink); font-weight: 500; }

/* EMPTY */
.empty {
  grid-column: 1/-1;
  text-align: center;
  padding: 5rem 2rem;
  color: var(--ink-60);
  font-size: 16.8px;
}
.empty-icon { font-size: 3.6rem; margin-bottom: 1rem; }

/* MODAL */
.modal-bg {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(26,23,20,0.55);
  backdrop-filter: blur(4px);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 1rem;
}
.modal-bg.open { display: flex; }

.modal {
  background: #fff;
  border-radius: 16px;
  max-width: 580px;
  width: 100%;
  max-height: 88vh;
  overflow-y: auto;
  position: relative;
  animation: slideUp 0.25s cubic-bezier(.22,.68,0,1.2);
  -webkit-overflow-scrolling: touch;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(24px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.modal-banner {
  height: 6px;
  border-radius: 16px 16px 0 0;
}

.modal-body { padding: 1.75rem 1.75rem 0; }
.modal-close-btn {
  position: absolute;
  top: 18px; right: 18px;
  width: 32px; height: 32px;
  border: 1px solid rgba(26,23,20,0.1);
  border-radius: 50%;
  background: #fff;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 19.2px;
  color: var(--ink-60);
  transition: background 0.15s;
}
.modal-close-btn:hover { background: var(--paper); }

.modal-tag {
  display: inline-block;
  font-size: 13.2px;
  font-weight: 500;
  letter-spacing: 0.12em;
  padding: 3px 12px;
  border-radius: 4px;
  margin-bottom: 10px;
}

.modal-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 28.8px;
  font-weight: 400;
  color: var(--ink);
  line-height: 1.3;
  margin-bottom: 10px;
}

.modal-desc {
  font-size: 16.8px;
  color: var(--ink-60);
  line-height: 1.8;
  margin-bottom: 1.5rem;
  padding-bottom: 1.5rem;
  border-bottom: 1px solid rgba(26,23,20,0.07);
}

.modal-meta-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 1.5rem;
}

.modal-meta-box {
  background: var(--paper);
  border-radius: 10px;
  padding: 12px 14px;
}
.modal-meta-box .label {
  font-size: 12px;
  letter-spacing: 0.15em;
  color: var(--ink-60);
  margin-bottom: 4px;
  text-transform: uppercase;
}
.modal-meta-box .val {
  font-size: 15.6px;
  font-weight: 500;
  color: var(--ink);
  line-height: 1.5;
}

.speakers-section { padding-bottom: 1.75rem; }
.speakers-label {
  font-size: 12px;
  letter-spacing: 0.18em;
  color: var(--ink-60);
  text-transform: uppercase;
  margin-bottom: 1rem;
}

.speaker-card {
  display: flex;
  gap: 14px;
  align-items: flex-start;
  padding: 14px 0;
  border-top: 1px solid rgba(26,23,20,0.06);
}

.speaker-avatar-lg {
  width: 48px; height: 48px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 500; color: #fff;
  flex-shrink: 0;
}

.speaker-name {
  font-family: 'Noto Serif TC', serif;
  font-size: 19.2px;
  font-weight: 400;
  color: var(--ink);
  margin-bottom: 2px;
}
.speaker-role {
  font-size: 14.4px;
  color: var(--ink-60);
  margin-bottom: 8px;
}
.speaker-bio {
  font-size: 15.6px;
  color: var(--ink-60);
  line-height: 1.8;
}

/* FULL BADGE */
.full-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: #fef2f2;
  color: #b91c1c;
  border: 1px solid #fecaca;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 500;
  padding: 5px 12px;
  letter-spacing: 0.05em;
  margin-bottom: 10px;
}
.card.is-full {
  opacity: 0.72;
}
.card.is-full .card-accent-bar {
  background: #d1d5db !important;
}
.full-modal-notice {
  background: #fef2f2;
  border: 1px solid #fecaca;
  border-radius: 10px;
  padding: 14px 16px;
  color: #b91c1c;
  font-size: 14px;
  text-align: center;
  margin: 1.5rem 0 1.75rem;
  letter-spacing: 0.05em;
  line-height: 1.8;
}

/* REGISTER BUTTON */
.register-btn {
  display: block;
  width: 100%;
  padding: 14px;
  background: var(--ink);
  color: var(--paper);
  border: none;
  border-radius: 10px;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 15.6px;
  font-weight: 500;
  letter-spacing: 0.1em;
  cursor: pointer;
  margin: 1.5rem 0 1.75rem;
  transition: background 0.2s, transform 0.1s;
}
.register-btn:hover { background: #333; }
.register-btn:active { transform: scale(0.98); }

/* REGISTER FORM */
.reg-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(26,23,20,0.65);
  backdrop-filter: blur(6px);
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 1rem;
}
.reg-overlay.open { display: flex; }
.reg-box {
  background: #fff;
  border-radius: 16px;
  padding: 2rem;
  max-width: 420px;
  width: 100%;
  position: relative;
  animation: slideUp 0.25s cubic-bezier(.22,.68,0,1.2);
}
.reg-box h3 {
  font-family: 'Noto Serif TC', serif;
  font-size: 20px;
  font-weight: 400;
  color: var(--ink);
  margin-bottom: 4px;
}
.reg-box .reg-subtitle {
  font-size: 13px;
  color: var(--ink-60);
  margin-bottom: 1.5rem;
}
.reg-box label {
  display: block;
  font-size: 12px;
  letter-spacing: 0.12em;
  color: var(--ink-60);
  margin-bottom: 6px;
}
.reg-box input[type="text"] {
  width: 100%;
  padding: 11px 14px;
  border: 1px solid rgba(26,23,20,0.15);
  border-radius: 8px;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 15px;
  color: var(--ink);
  outline: none;
  transition: border-color 0.2s;
  margin-bottom: 1.25rem;
}
.reg-box input[type="text"]:focus { border-color: var(--ink); }
.reg-submit {
  display: block;
  width: 100%;
  padding: 13px;
  background: var(--ink);
  color: var(--paper);
  border: none;
  border-radius: 8px;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  letter-spacing: 0.08em;
  transition: background 0.2s;
}
.reg-submit:hover { background: #333; }
.reg-submit:disabled { background: #aaa; cursor: not-allowed; }
.reg-close {
  position: absolute;
  top: 14px; right: 14px;
  width: 30px; height: 30px;
  border: 1px solid rgba(26,23,20,0.1);
  border-radius: 50%;
  background: #fff;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  color: var(--ink-60);
}
.reg-close:hover { background: var(--paper); }

/* SUCCESS */
.success-box {
  text-align: center;
  padding: 1rem 0 0.5rem;
}
.success-icon {
  width: 60px; height: 60px;
  border-radius: 50%;
  background: #e8f5e0;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px;
  margin: 0 auto 1rem;
}
.success-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 22px;
  font-weight: 400;
  color: var(--ink);
  margin-bottom: 8px;
}
.success-msg {
  font-size: 14px;
  color: var(--ink-60);
  line-height: 1.8;
}
.success-close-btn {
  display: inline-block;
  margin-top: 1.5rem;
  padding: 10px 28px;
  background: var(--ink);
  color: var(--paper);
  border: none;
  border-radius: 8px;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 14px;
  cursor: pointer;
  transition: background 0.2s;
}
.success-close-btn:hover { background: #333; }

/* FOOTER */
footer {
  background: var(--ink);
  color: rgba(247,244,239,0.35);
  text-align: center;
  padding: 2rem;
  font-size: 14.4px;
  letter-spacing: 0.1em;
}

@media (max-width: 640px) {
  /* Header */
  .header-inner { padding: 2rem 1.25rem 1.5rem; }
  h1 { font-size: 1.9rem; letter-spacing: 0.03em; }
  .subtitle { font-size: 13px; }
  .stats-row { gap: 1.25rem; padding-top: 1rem; }
  .stat-num { font-size: 1.8rem; }

  /* Search section */
  .search-section { padding-bottom: 1.25rem; }
  .search-inner {
    padding: 0 1.25rem;
    flex-direction: column;
    align-items: stretch;
    gap: 10px;
  }
  .search-wrap { min-width: unset; width: 100%; }
  .filter-wrap { gap: 6px; }
  .pill { font-size: 13px; padding: 7px 13px; }

  /* Main */
  main { padding: 1.5rem 1.25rem 3rem; }

  /* Grid */
  .grid { grid-template-columns: 1fr; gap: 14px; }

  /* Modal */
  .modal-bg { align-items: flex-end; padding: 0; }
  .modal {
    border-radius: 20px 20px 0 0;
    max-height: 92vh;
    width: 100%;
    max-width: 100%;
  }
  .modal-banner { border-radius: 20px 20px 0 0; }
  .modal-body { padding: 1.25rem 1.25rem 0; }
  .modal-meta-grid { grid-template-columns: 1fr; }
  .modal-title { font-size: 22px; }

  /* Reg box */
  .reg-overlay { align-items: flex-end; padding: 0; }
  .reg-box {
    border-radius: 20px 20px 0 0;
    max-width: 100%;
    width: 100%;
    padding: 1.75rem 1.25rem 2.5rem;
  }

  /* Card */
  .card-body { padding: 1.1rem 1.1rem 0.75rem; }
  .card-footer { padding: 8px 1.1rem 1rem; }
  .card-title { font-size: 17px; }
  .card-desc { font-size: 13px; }
}

/* FLOATING KEYWORDS */
.fw-1 { font-size: 7rem; top: 10%; left: -2%; animation-duration: 8s; animation-direction: alternate; }
.fw-2 { font-size: 5rem; top: 40%; right: 5%; animation-duration: 11s; animation-direction: alternate-reverse; }
.fw-3 { font-size: 6rem; bottom: 8%; left: 20%; animation-duration: 9s; animation-direction: alternate; }

@media (max-width: 640px) {
  .fw-1 { font-size: 3.5rem; top: 8%;  left: 2%;   }
  .fw-2 { font-size: 3rem;   top: 45%; right: 4%;  }
  .fw-3 { font-size: 3.2rem; bottom: 10%; left: 35%; }
}

.float-words {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
  z-index: 0;
}
.float-word {
  position: absolute;
  font-family: 'Noto Serif TC', serif;
  font-weight: 300;
  color: rgba(247,244,239,0.055);
  letter-spacing: 0.25em;
  white-space: nowrap;
  animation: floatDrift linear infinite;
  user-select: none;
}
@keyframes floatDrift {
  from { transform: translateY(0px); }
  to   { transform: translateY(-18px); }
}
</style>
</head>
<body>

<header>
  <div class="header-deco">
    <svg viewBox="0 0 320 240" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="280" cy="40" r="120" stroke="white" stroke-width="0.5"/>
      <circle cx="280" cy="40" r="80" stroke="white" stroke-width="0.5"/>
      <circle cx="280" cy="40" r="40" stroke="white" stroke-width="0.5"/>
      <line x1="0" y1="120" x2="320" y2="120" stroke="white" stroke-width="0.3"/>
      <line x1="160" y1="0" x2="160" y2="240" stroke="white" stroke-width="0.3"/>
    </svg>
  </div>
  <div class="float-words" aria-hidden="true">
    <span class="float-word fw-1">增能</span>
    <span class="float-word fw-2">療癒</span>
    <span class="float-word fw-3">舒壓</span>
  </div>
  <div class="header-inner">
    <span class="site-label">停泊疲勞身心靈的時刻......</span>
    <h1>教師研習<br>活動總覽</h1>
    <p class="subtitle">健康 · 藝術 · 科技 · 生活美學 · 舞蹈</p>
    <div class="stats-row">
      <div class="stat"><div class="stat-num">8</div><div class="stat-label">場研習</div></div>
      <div class="stat"><div class="stat-num">5</div><div class="stat-label">主題領域</div></div>
      <div class="stat"><div class="stat-num">9</div><div class="stat-label">位講師</div></div>
    </div>
  </div>
</header>

<div class="search-section">
  <div class="search-inner">
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="search" placeholder="搜尋活動、講者、地點…" oninput="doFilter()" autocomplete="off">
    </div>
    <div class="filter-wrap">
      <button class="pill active" onclick="setFilter('全部',this)">全部</button>
      <button class="pill" onclick="setFilter('健康',this)">健康保健</button>

let currentFilter = '全部';

function initials(name) { return name.slice(0,2); }

function renderCards(list) {
  const grid = document.getElementById('grid');
  const rc = document.getElementById('result-count');
  rc.textContent = list.length === 8 ? '顯示全部 8 場活動' : '顯示 ' + list.length + ' 場活動';

  if (!list.length) {
    grid.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div>找不到符合條件的研習活動</div>';
    return;
  }

  grid.innerHTML = list.map((e, i) => {
    const c = CAT[e.cat];
    return `
    <div class="card ${e.full ? 'is-full' : ''}" onclick="openModal(${e.id})" style="animation-delay:${i*0.05}s" role="button" tabindex="0" aria-label="${e.title}">
      <div class="card-accent-bar" style="background:${c.bar}"></div>
      <div class="card-body">
        <div class="card-head">
          <div class="icon-circle" style="background:${c.bg};color:${c.color}">${ICON[e.cat]}</div>
          <div>
            <span class="card-tag" style="background:${c.bg};color:${c.color}">${e.cat}</span>
            <div class="card-title">${e.title}</div>
          </div>
        </div>
        <p class="card-desc">${e.desc}</p>
        <div class="card-meta">
          <div class="meta-item">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <span class="meta-val">${e.date}</span>
          </div>
          <div class="meta-item">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <span class="meta-val">${e.time}</span>
          </div>
          <div class="meta-item">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            <span class="meta-val">${e.location}</span>
          </div>
        </div>
      </div>
      <div class="card-footer">
        ${e.speakers.map(s => `
          <div class="speaker-chip">
            <div class="chip-avatar" style="background:${s.color}">${initials(s.name)}</div>
            <span class="chip-name">${s.name}</span>
            <span>${s.role}</span>
          </div>
        `).join('')}
      </div>
    </div>`;
  }).join('');
}

function doFilter() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  let list = currentFilter === '全部' ? events : events.filter(e => e.cat === currentFilter);
  if (q) list = list.filter(e =>
    e.title.toLowerCase().includes(q) ||
    e.desc.toLowerCase().includes(q) ||
    e.location.toLowerCase().includes(q) ||
    e.date.includes(q) ||
    e.speakers.some(s => s.name.includes(q) || s.role.includes(q))
  );
  renderCards(list);
}

function setFilter(cat, el) {
  currentFilter = cat;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  doFilter();
}

function openModal(id) {
  const e = events.find(x => x.id === id);
  const c = CAT[e.cat];
  document.getElementById('modal-banner').style.background = c.bar;
  document.getElementById('modal-body').innerHTML = `
    <span class="modal-tag" style="background:${c.bg};color:${c.color}">${e.cat}</span>
    <h2 class="modal-title">${e.title}</h2>
    <p class="modal-desc">${e.desc}</p>
    <div class="modal-meta-grid">
      <div class="modal-meta-box">
        <div class="label">日期</div>
        <div class="val">${e.date}</div>
      </div>
      <div class="modal-meta-box">
        <div class="label">時間</div>
        <div class="val">${e.time}</div>
      </div>
      <div class="modal-meta-box" style="grid-column:1/-1">
        <div class="label">地點</div>
        <div class="val">${e.location}</div>
      </div>
    </div>
    <div class="speakers-section">
      <div class="speakers-label">講師介紹</div>
      ${e.speakers.map(s => `
        <div class="speaker-card">
          <div class="speaker-avatar-lg" style="background:${s.color}">${initials(s.name)}</div>
          <div>
            <div class="speaker-name">${s.name}</div>
            <div class="speaker-role">${s.role}</div>
            <div class="speaker-bio">${s.bio}</div>
          </div>
        </div>
      `).join('')}
    </div>
    <div id="modal-reg-area"></div>
  `;
  document.getElementById('modal-bg').classList.add('open');
  document.body.style.overflow = 'hidden';

  const regArea = document.getElementById('modal-reg-area');
  if (e.full) {
    const notice = document.createElement('div');
    notice.className = 'full-modal-notice';
    notice.innerHTML = '🈵 已經額滿囉<br><span style="font-size:13px;color:#6b7280">下次請早！</span>';
    regArea.appendChild(notice);
  } else if (e.id === 7) {
    const btnAM = document.createElement('button');
    btnAM.className = 'register-btn';
    btnAM.style.cssText = 'margin:0;';
    btnAM.textContent = '報名上午場';
    btnAM.onclick = function() { openReg(7, 0); };
    const btnPM = document.createElement('button');
    btnPM.className = 'register-btn';
    btnPM.style.cssText = 'margin:0;background:#5b3e8a;';
    btnPM.textContent = '報名下午場';
    btnPM.onclick = function() { openReg(7, 1); };
    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;gap:10px;margin:1.5rem 0 1.75rem;';
    wrap.appendChild(btnAM);
    wrap.appendChild(btnPM);
    regArea.appendChild(wrap);
  } else {
    const btn = document.createElement('button');
    btn.className = 'register-btn';
    btn.textContent = '我要報名';
    btn.onclick = function() { openReg(e.id, -1); };
    regArea.appendChild(btn);
  }
}

function closeModal() {
  document.getElementById('modal-bg').classList.remove('open');
  document.body.style.overflow = '';
}

function handleBgClick(e) {
  if (e.target === document.getElementById('modal-bg')) closeModal();
}

// ── REGISTRATION ──────────────────────────────────────
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxCIMCDKpKyrUNiWMRk_c4kR9IkQCKo5Y4bpfNSQh_fn94CzLv47s_q4lnsxRxvu0igWw/exec';
let currentRegEvent = null;

function openReg(id, session) {
  currentRegEvent = events.find(x => x.id === id);
  var sessionLabel = session === 0 ? '上午場 09:00–12:00' : session === 1 ? '下午場 13:00–16:00' : '';
  currentRegEvent._session = sessionLabel;
  var subtitle = currentRegEvent.title + (sessionLabel ? '　' + sessionLabel : '') + '　' + currentRegEvent.date;
  var html = '<h3>我要報名</h3>'
    + '<p class="reg-subtitle">' + subtitle + '</p>'
    + '<label>教師姓名</label>'
    + '<input type="text" id="reg-name" placeholder="請輸入您的姓名" autocomplete="off" />'
    + '<button class="reg-submit" id="reg-submit-btn" onclick="submitReg()">確認報名</button>';
  document.getElementById('reg-content').innerHTML = html;
  document.getElementById('reg-overlay').classList.add('open');
  setTimeout(function() { var n = document.getElementById('reg-name'); if(n) n.focus(); }, 100);
}

function closeReg() {
  document.getElementById('reg-overlay').classList.remove('open');
  currentRegEvent = null;
}

async function submitReg() {
  const nameEl = document.getElementById('reg-name');
  const name = nameEl ? nameEl.value.trim() : '';
  if (!name) { nameEl.style.borderColor = '#e24b4a'; nameEl.focus(); return; }

  const btn = document.getElementById('reg-submit-btn');
  btn.disabled = true;
  btn.textContent = '送出中…';

  const savedName = name;
  const savedEvent = currentRegEvent;

  const sessionStr = savedEvent._session || '';
  const params = new URLSearchParams({
    name: savedName,
    event: savedEvent.title + (sessionStr ? '(' + sessionStr + ')' : ''),
    date: savedEvent.date,
    time: sessionStr || savedEvent.time,
    location: savedEvent.location,
    timestamp: new Date().toLocaleString('zh-TW', {timeZone:'Asia/Taipei'})
  });
  new Image().src = APPS_SCRIPT_URL + '?' + params.toString();
  await new Promise(r => setTimeout(r, 800));

  const html = '<div class="success-box">' + '<div class="success-icon">🎉</div>' + '<div class="success-title">歡迎老師光臨！</div>' + '<div class="success-msg">' + '<strong>' + savedName + '老師</strong>，您已成功報名<br>' + '<strong>' + savedEvent.title + '</strong><br>' + '期待在研習現場與您相見 ✨' + '</div>' + '<button class="success-close-btn" onclick="closeReg()">返回活動頁面</button>' + '</div>';
  document.getElementById('reg-content').innerHTML = html;
}

document.getElementById('reg-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeReg();
});

// ── END REGISTRATION ───────────────────────────────────

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeModal(); closeReg(); }
});

renderCards(events);
</script>
